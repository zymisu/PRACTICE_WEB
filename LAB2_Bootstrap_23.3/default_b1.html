<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LIVE SIDES - LAYOUT</title>
   
    <!-- Bootstrap 4.6 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="style_b1.css">
</head>

<body>

<div class="container-fluid p-0 layout">

    <div class="header"></div>

    <div class="row tile-row">
        <div class="col-md-2"><div class="tile c1"></div></div>
        <div class="col-md-2"><div class="tile c2"></div></div>
        <div class="col-md-4"><div class="tile c3"></div></div>
        <div class="col-md-2"><div class="tile c4"></div></div>
        <div class="col-md-2"><div class="tile c5"></div></div>
    </div>

    <div class="row tile-row">
        <div class="col-md-2"><div class="tile c6"></div></div>
        <div class="col-md-2"><div class="tile c7"></div></div>
        <div class="col-md-2"><div class="tile c8"></div></div>
        <div class="col-md-2"><div class="tile c9"></div></div>
        <div class="col-md-4"><div class="tile c10"></div></div>
    </div>

    <div class="row tile-row">
        <div class="col-md-2"><div class="tile c11"></div></div>
        <div class="col-md-2"><div class="tile c12"></div></div>
        <div class="col-md-4"><div class="tile c13"></div></div>
        <div class="col-md-2"><div class="tile c14"></div></div>
        <div class="col-md-2"><div class="tile c15"></div></div>
    </div>

    <div class="footer"></div>

</div>

</body>
</html>
