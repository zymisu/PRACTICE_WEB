<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LAB.03 JS</title>

<style>
    body {
        font-family: Arial;
        background: #f4f6f9;
        text-align: center;
    }

    h2 {
        color: #333;
    }

    .box {
        width: 80%;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(2, 81, 171, 0.989);
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    .run {
        background: #28a745;
        color: white;
    }

    .clear {
        background: #dc3545;
        color: white;
    }

    pre {
        text-align: left;
        background: #222;
        color: #0f0;
        padding: 15px;
        border-radius: 5px;
        height: 400px;
        overflow: auto;
    }
</style>

</head>

<body>

<h2>LAB.03 - XỬ LÝ MẢNG</h2>

<div class="box">
    <button class="run" onclick="runAll()">▶ Chạy</button>
    <button class="clear" onclick="clearOutput()">❌ Xóa kết quả</button>

    <pre id="output"></pre>
</div>

<script src="script.js"></script>

</body>
</html>
