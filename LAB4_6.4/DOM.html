<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Thông Tin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- FORM -->
  <div class="form-panel">
    <h2>Thông tin</h2>

    <div class="field" id="field-hoten">
      <label>Họ tên</label>
      <input type="text" id="hoten" placeholder="Nhập họ tên...">
    </div>

    <div class="field" id="field-namsinh">
      <label>Năm sinh</label>
      <input type="number" id="namsinh" placeholder="VD: 2026" min="1900" max="2099">
    </div>

    <div class="field">
      <label>Sở thích</label>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" name="sothich" value="Thể thao"> Thể thao
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="sothich" value="Âm nhạc"> Âm nhạc
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="sothich" value="Du lịch"> Du lịch
        </label>
      </div>
    </div>

    <div class="field" id="field-quocgia">
      <label>Quốc gia</label>
      <select id="quocgia">
        <option value="">-- Chọn quốc gia --</option>
        <option value="Việt Nam">Việt Nam</option>
        <option value="Mỹ">Mỹ</option>
        <option value="Nhật Bản">Nhật Bản</option>
        <option value="Hàn Quốc">Hàn Quốc</option>
        <option value="Pháp">Pháp</option>
        <option value="Anh">Anh</option>
        <option value="Khác">Khác</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn-add" id="btnThem">Thêm</button>
      <button class="btn-del" id="btnXoa">Xóa</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="list-panel">
    <h2>Danh sách <span id="countBadge" class="count-badge">0 người</span></h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:30px">STT</th>
            <th>Họ tên</th>
            <th style="width:140px">Năm sinh</th>
            <th>Sở thích</th>
            <th>Quốc gia</th>
            <th style="width:100px"></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr id="emptyRow">
            <td colspan="6" class="empty-msg">Chưa có dữ liệu. Nhấn Thêm để bắt đầu.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
